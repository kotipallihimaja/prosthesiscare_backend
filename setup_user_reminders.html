<!DOCTYPE html>
<html>
<head>
    <title>Setup Reminders</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        button { padding: 15px 30px; background: blue; color: white; font-size: 16px; border: none; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: #f0f0f0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>Setup Reminders for User</h2>
    <input type="number" id="user_id" placeholder="Enter User ID" value="1">
    <button onclick="setupReminders()">Setup Reminders</button>
    <div id="result"></div>

    <script>
        function setupReminders() {
            var userId = document.getElementById('user_id').value;
            
            var data = { user_id: userId };
            
            fetch('http://localhost/prosthesis_app/setup_reminders.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                document.getElementById('result').innerText = JSON.stringify(result, null, 2);
            })
            .catch(error => {
                document.getElementById('result').innerText = 'Error: ' + error;
            });
        }
    </script>
</body>
</html>
