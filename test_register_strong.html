<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration - Strong Password</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; margin: 0; }
        .container { max-width: 450px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
        input:focus { border-color: #667eea; outline: none; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        
        /* Password Requirements */
        .password-requirements {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        .password-requirements h4 { margin: 0 0 10px 0; color: #333; }
        .requirement { margin: 5px 0; color: #dc3545; }
        .requirement.met { color: #28a745; }
        .requirement::before { content: "✗ "; }
        .requirement.met::before { content: "✓ "; }
        
        /* Result Box */
        .result { margin-top: 20px; padding: 15px; border-radius: 8px; white-space: pre-wrap; font-family: monospace; display: none; }
        .result.show { display: block; }
        .result.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .result.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        .row { display: flex; gap: 10px; }
        .row .form-group { flex: 1; }
    </style>
</head>
<body>
    <div class="container">
        <h2>CREATE ACCOUNT</h2>
        
        <div class="form-group">
            <label>Full Name:</label>
            <input type="text" id="name" placeholder="Enter your full name">
        </div>
        
        <div class="row">
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="email" placeholder="email@example.com">
            </div>
            <div class="form-group">
                <label>Phone:</label>
                <input type="text" id="phone" placeholder="Phone number">
            </div>
        </div>
        
        <div class="row">
            <div class="form-group">
                <label>Age:</label>
                <input type="number" id="age" placeholder="Age">
            </div>
            <div class="form-group">
                <label>Date of Birth:</label>
                <input type="date" id="date_of_birth">
            </div>
        </div>
        
        <!-- Password Requirements -->
        <div class="password-requirements">
            <h4>Password Requirements:</h4>
            <div class="requirement met" id="req-length">At least 8 characters</div>
            <div class="requirement met" id="req-capital">At least one CAPITAL letter (A-Z)</div>
            <div class="requirement met" id="req-number">At least one NUMBER (0-9)</div>
            <div class="requirement met" id="req-special">At least one SPECIAL character (!@#$%^&*)</div>
        </div>
        
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="password" placeholder="Enter password" onkeyup="checkPassword()">
        </div>
        
        <div class="form-group">
            <label>Confirm Password:</label>
            <input type="password" id="confirm_password" placeholder="Confirm password">
        </div>
        
        <button onclick="register()">CREATE ACCOUNT</button>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        function checkPassword() {
            var password = document.getElementById('password').value;
            
            // Check length
            var reqLength = document.getElementById('req-length');
            if(password.length >= 8) {
                reqLength.classList.add('met');
            } else {
                reqLength.classList.remove('met');
            }
            
            // Check capital letter
            var reqCapital = document.getElementById('req-capital');
            if(/[A-Z]/.test(password)) {
                reqCapital.classList.add('met');
            } else {
                reqCapital.classList.remove('met');
            }
            
            // Check number
            var reqNumber = document.getElementById('req-number');
            if(/[0-9]/.test(password)) {
                reqNumber.classList.add('met');
            } else {
                reqNumber.classList.remove('met');
            }
            
            // Check special character
            var reqSpecial = document.getElementById('req-special');
            if(/[!@#$%^&*(),.?":{}|<>]/.test(password)) {
                reqSpecial.classList.add('met');
            } else {
                reqSpecial.classList.remove('met');
            }
        }
        
        function register() {
            var name = document.getElementById('name').value;
            var email = document.getElementById('email').value;
            var phone = document.getElementById('phone').value;
            var age = document.getElementById('age').value;
            var dob = document.getElementById('date_of_birth').value;
            var password = document.getElementById('password').value;
            var confirmPassword = document.getElementById('confirm_password').value;
            var resultDiv = document.getElementById('result');
            
            // Validation
            if(!name || !email || !phone || !age || !dob || !password || !confirmPassword) {
                showResult(false, "Please fill in all fields!");
                return;
            }
            
            if(password !== confirmPassword) {
                showResult(false, "Passwords do not match!");
                return;
            }
            
            if(password.length < 8) {
                showResult(false, "Password must be at least 8 characters!");
                return;
            }
            
            if(!/[A-Z]/.test(password)) {
                showResult(false, "Password must have at least one CAPITAL letter!");
                return;
            }
            
            if(!/[0-9]/.test(password)) {
                showResult(false, "Password must have at least one NUMBER!");
                return;
            }
            
            if(!/[!@#$%^&*(),.?":{}|<>]/.test(password)) {
                showResult(false, "Password must have at least one SPECIAL character (!@#$%^&*)!");
                return;
            }
            
            var data = {
                name: name,
                email: email,
                phone: phone,
                age: age,
                date_of_birth: dob,
                password: password,
                confirm_password: confirmPassword
            };
            
            fetch('http://localhost/prosthesis_app/register.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                showResult(result.success, JSON.stringify(result, null, 2));
            })
            .catch(error => {
                showResult(false, "Error: " + error);
            });
        }
        
        function showResult(success, message) {
            var resultDiv = document.getElementById('result');
            resultDiv.innerText = message;
            resultDiv.className = "result show " + (success ? "success" : "error");
        }
    </script>
</body>
</html>
